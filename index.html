<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Alerts</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>US Weather Alerts</h1>
  <p>Enter a US state abbreviation to get current weather alerts.</p>

  <!-- The placeholder MUST be exactly "Enter state abbreviation" for Jest tests to find it -->
  <input type="text" id="state-input" placeholder="Enter state abbreviation" />

  <!-- The button text MUST be exactly "Get Weather Alerts" for Jest tests to find it -->
  <button id="fetch-btn">Get Weather Alerts</button>

  <!-- Error message div — hidden by default via CSS, shown dynamically on error -->
  <div id="error-message"></div>

  <!-- Alerts container — populated dynamically by displayAlerts() -->
  <div id="alerts-container"></div>

  <!-- Link the JavaScript file last so DOM elements are available when JS runs -->
  <script src="index.js"></script>

</body>
</html>
